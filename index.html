<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Carolina</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #8a0b0b;
            --neon-red: #ff0000;
            --screen-bg: #111;
            --screen-text: #00ff41;
            --dark: #050505;
            --text: #c0c0c0;
        }
        body {
            background-color: #000;
            background-image: 
                linear-gradient(rgba(30,0,0,0.2) 2px, transparent 2px), 
                linear-gradient(90deg, rgba(30,0,0,0.2) 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            user-select: none;
            font-size: 16px; 
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .sidebar {
            width: 340px; 
            background: #0a0a0a;
            border-right: 5px ridge var(--blood);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 10px 0 40px rgba(0,0,0,1);
            z-index: 10;
            overflow-y: auto; 
        }
        .avatar-container {
            width: 200px; height: 200px; 
            min-height: 200px; flex-shrink: 0;   
            border: 3px double var(--neon-red);
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 15px;
            animation: float 4s ease-in-out infinite;
            background: #000;
            box-shadow: 0 0 20px var(--blood);
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        h1 { 
            font-family: 'UnifrakturMaguntia'; 
            font-size: 3.2em; 
            color: var(--neon-red); 
            margin: 5px 0; 
            text-shadow: 3px 3px 0px #330000; 
            line-height: 1;
        }
        .nav-btn {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 15px; margin: 6px 0; cursor: pointer;
            font-family: 'Share Tech Mono'; font-size: 1.2em; text-transform: uppercase;
            transition: 0.2s; letter-spacing: 1px;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--blood); border-color: #fff;
            box-shadow: 0 0 15px var(--blood);
            transform: scale(1.02); font-weight: bold;
        }
        .main-content {
            flex: 1; padding: 50px; overflow-y: auto;
            background: radial-gradient(circle at center, #220505 0%, #000 85%);
            position: relative;
        }
        .floating-deco { position: absolute; pointer-events: none; opacity: 0.9; z-index: 5; }
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h2 {
            border-bottom: 3px solid var(--blood); 
            color: #fff; font-size: 1.8em; margin-bottom: 20px; letter-spacing: 2px;
        }
        .blog-post {
            background: rgba(15,15,15,0.9); border: 1px solid #444;
            padding: 30px; margin-bottom: 30px;
            box-shadow: 8px 8px 0px #1a0000;
        }
        .blog-post p { font-size: 1.1em; line-height: 1.5; }
        input, textarea { font-size: 1.1em; padding: 12px; border: 1px solid #444; background: #000; color: #fff; width: 100%; box-sizing: border-box;}
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .photo-card {
            background: #000; border: 1px solid #333; padding: 10px; text-align: center;
            transition: 0.3s;
        }
        .photo-card:hover { border-color: var(--neon-red); transform: scale(1.03); }
        .floating-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #333;
            box-shadow: 0 0 20px #000;
            padding: 10px;
            z-index: 1000; 
            border-radius: 5px;
            backdrop-filter: blur(5px);
        }
        .player-screen {
            background: #000;
            border: 1px inset #444;
            color: var(--neon-red);
            font-family: 'Share Tech Mono';
            padding: 5px;
            margin-bottom: 8px;
            font-size: 0.8em;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }
        .scroll-text { display: inline-block; animation: scroll 8s linear infinite; padding-left: 100%; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .progress-bg { width: 100%; height: 4px; background: #333; margin-bottom: 8px; cursor: pointer; }
        .progress-fill { height: 100%; width: 0%; background: var(--blood); transition: width 0.1s linear; }
        .player-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;}
        .p-btn { 
            background: #111; border: 1px solid #444; color: #ccc; cursor: pointer; 
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
        }
        .p-btn:hover { border-color: var(--neon-red); color: #fff; }
        .play-big { width: 40px; height: 40px; font-size: 1.2em; border-color: var(--blood); color: var(--blood); }
        .volume-ctrl { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.7em; color: #666; }
        .vol-btn { width: 20px; height: 20px; font-size: 0.8em; padding: 0; background: #000; border: 1px solid #333; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="floating-player">
        <audio id="audio-player"></audio>
        <div class="player-screen">
            <span id="track-name" class="scroll-text">CARGANDO SISTEMA...</span>
        </div>
        <div class="progress-bg" onclick="seek(event)">
            <div id="progress" class="progress-fill"></div>
        </div>
        <div class="player-controls">
            <button class="p-btn" onclick="prevTrack()">|&lt;</button>
            <button class="p-btn play-big" id="playBtn" onclick="togglePlay()">&#9658;</button>
            <button class="p-btn" onclick="nextTrack()">&gt;|</button>
        </div>
        <div class="volume-ctrl">
            <span>VOL:</span>
            <button class="vol-btn" onclick="changeVol(-0.1)">-</button>
            <span id="vol-display">50%</span>
            <button class="vol-btn" onclick="changeVol(0.1)">+</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="avatar-container">
            <img src="avatar.gif" class="avatar-img" alt="Foto Perfil">
        </div>
        <h1>Tu Blog</h1>
        <p style="font-size: 0.9em; letter-spacing: 3px; color: #fff;">★ MI BLOG ★</p>
        <img src="separador.gif" style="width: 100%; max-width: 280px; margin: 15px 0; opacity: 0.9;">
        <button class="nav-btn active" onclick="showSection('home', this)">Inicio</button>
        <button class="nav-btn" onclick="showSection('piercings', this)">Mis Piercings</button>
        <button class="nav-btn" onclick="showSection('journal', this)">Diario</button>
        <button class="nav-btn" onclick="showSection('contact', this)">Mensajes</button>
        <div style="margin-top: auto; padding-top: 20px;">
            <img src="murcielago.gif" width="100" style="opacity: 0.8;">
        </div>
    </div>
    <div class="main-content">
        <img src="calavera.gif" class="floating-deco" style="top: 10px; right: 40px; width: 100px;">
        <div id="home" class="section active">
            <h2>>> BIENVENIDO/A</h2>
            <div class="blog-post">
                <p id="typing" style="font-size: 1.4em; color: #fff; font-weight: bold;"></p>
                <br>
                <p>Escribe lo que piensas..</p>
                <br>
                <div style="text-align: center;">
                    <img src="separador.gif" width="250">
                </div>
            </div>
        </div>
        <div id="piercings" class="section">
            <h2>>> MIS PIERCINGS</h2>
            <br>
            <div class="photo-grid">
                <div class="photo-card">
                    <div style="height: 180px; background: #111; display: flex; align-items: center; justify-content: center; color: #555; font-size: 1.2em;">FOTO</div>
                    <span style="color: var(--neon-red); font-size: 1.1em; display: block; margin-top: 10px;">PIERCING 1</span>
                </div>
                <div class="photo-card">
                    <div style="height: 180px; background: #111; display: flex; align-items: center; justify-content: center; color: #555; font-size: 1.2em;">FOTO</div>
                    <span style="color: var(--neon-red); font-size: 1.1em; display: block; margin-top: 10px;">PIERCING 2</span>
                </div>
                <div class="photo-card">
                    <div style="height: 180px; background: #111; display: flex; align-items: center; justify-content: center; color: #555; font-size: 1.2em;">FOTO</div>
                    <span style="color: var(--neon-red); font-size: 1.1em; display: block; margin-top: 10px;">PIERCING 3</span>
                </div>
            </div>
        </div>
        <div id="journal" class="section">
            <h2>>> DIARIO PERSONAL</h2>
            <div class="blog-post">
                <p>Escribe lo que piensas..</p>
            </div>
        </div>
        <div id="contact" class="section">
            <h2>>> MANDAR MENSAJE</h2>
            <input type="text" placeholder="ASUNTO..." style="margin-bottom: 20px;">
            <textarea placeholder="ESCRIBE AQUÍ..." style="height: 150px; margin-bottom: 20px;"></textarea>
            <button class="nav-btn" style="border-color: var(--neon-red); color: var(--neon-red); font-weight: bold;">ENVIAR AHORA</button>
        </div>
    </div>
    <script>
        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const text = "Bienvenida.";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            }
        }
        window.onload = () => {
            type();
            const promise = audio.play();
            if (promise !== undefined) {
                promise.then(_ => {
                    playBtn.innerHTML = "||";
                }).catch(error => {
                    console.log("Autoplay bloqueado hasta interacción");
                });
            }
        };
        const playlist = [
            { title: "♪ CANCIÓN FONDO ♪", src: "cancion4.mp3" },
            { title: "Gorillaz - Feel Good Inc", src: "cancion1.mp3" },
            { title: "Gorillaz - DARE", src: "cancion2.mp3" },
            { title: "Gorillaz - Clint Eastwood", src: "cancion3.mp3" }
        ];
        let currentIdx = 0;
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('playBtn');
        const trackLabel = document.getElementById('track-name');
        const progressBar = document.getElementById('progress');
        const volDisplay = document.getElementById('vol-display');
        audio.src = playlist[0].src;
        audio.volume = 0.5;
        trackLabel.innerText = playlist[0].title;
        document.body.addEventListener('click', () => {
            if(audio.paused && audio.currentTime === 0) {
                togglePlay();
            }
        }, { once: true });
        function togglePlay() {
            if(audio.paused) {
                audio.play();
                playBtn.innerHTML = "||";
                trackLabel.style.animationPlayState = "running";
            } else {
                audio.pause();
                playBtn.innerHTML = "&#9658;";
                trackLabel.style.animationPlayState = "paused";
            }
        }
        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack();
        }
        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack();
        }
        function loadTrack() {
            audio.src = playlist[currentIdx].src;
            trackLabel.innerText = playlist[currentIdx].title;
            audio.play();
            playBtn.innerHTML = "||";
        }
        function changeVol(delta) {
            let newVol = Math.min(1, Math.max(0, audio.volume + delta));
            audio.volume = newVol;
            volDisplay.innerText = Math.round(newVol * 100) + "%";
        }
        function seek(e) {
            const width = e.target.parentElement.clientWidth; 
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) {
                audio.currentTime = (clickX / 260) * duration; 
            }
        }
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
            }
        });
        audio.addEventListener('ended', nextTrack);
    </script>
</body>
</html>
